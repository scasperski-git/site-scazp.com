<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kemaskini OSB & Findings</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent-gold: #d4af37;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        /* KPI Dashboard Grid */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: glowHighlight 4s infinite alternate;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-gold);
        }

        .kpi-card h3 {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .kpi-card p {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: var(--text-main);
        }

        @keyframes glowHighlight {
            0% { box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.15); }
        }

        /* Table Styles */
        .table-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #1a1a1a;
            color: var(--accent-gold);
            font-weight: 600;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-done { background-color: rgba(46, 125, 50, 0.2); color: #81c784; border: 1px solid #2e7d32; }
        .status-pending { background-color: rgba(198, 40, 40, 0.2); color: #e57373; border: 1px solid #c62828; }

        .btn-update {
            background-color: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .btn-update:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .kpi-container {
                gap: 8px;
            }
            .kpi-card {
                padding: 10px 5px;
            }
            .kpi-card h3 { font-size: 9px; }
            .kpi-card p { font-size: 14px; }
            table { font-size: 11px; }
            th, td { padding: 8px 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard Pemantauan OSB</h1>
    </div>

    <!-- KPI Section -->
    <div class="kpi-container">
        <div class="kpi-card">
            <h3>Total Akaun</h3>
            <p>1,245</p>
        </div>
        <div class="kpi-card">
            <h3>Dah Update</h3>
            <p style="color: #81c784;">830</p>
        </div>
        <div class="kpi-card">
            <h3>Belum Update</h3>
            <p style="color: #e57373;">415</p>
        </div>
        <div class="kpi-card">
            <h3>Total OSB (RM)</h3>
            <p>1.2M</p>
        </div>
    </div>

    <!-- Data Table Section -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>REGION</th>
                    <th>LOC CD</th>
                    <th>ACCT</th>
                    <th>V_DELQ</th>
                    <th>ARR MTH</th>
                    <th>OSB (RM)</th>
                    <th>STATUS</th>
                    <th>TINDAKAN</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contoh Data 1 -->
                <tr>
                    <td>NORTH</td>
                    <td>A101</td>
                    <td>1002938475</td>
                    <td>2</td>
                    <td>3</td>
                    <td>3,450.00</td>
                    <td><span class="status-done">DAH UPDATE</span></td>
                    <td><button class="btn-update">KEMASKINI</button></td>
                </tr>
                <!-- Contoh Data 2 -->
                <tr>
                    <td>SOUTH</td>
                    <td>B205</td>
                    <td>1009847563</td>
                    <td>1</td>
                    <td>1</td>
                    <td>1,200.50</td>
                    <td><span class="status-pending">BELUM</span></td>
                    <td><button class="btn-update">KEMASKINI</button></td>
                </tr>
                 <!-- Contoh Data 3 -->
                 <tr>
                    <td>CENTRAL</td>
                    <td>C302</td>
                    <td>1005566778</td>
                    <td>4</td>
                    <td>6</td>
                    <td>8,900.25</td>
                    <td><span class="status-done">DAH UPDATE</span></td>
                    <td><button class="btn-update">KEMASKINI</button></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
