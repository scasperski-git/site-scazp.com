<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kemaskini OSB & Findings</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent-gold: #d4af37;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* --- LOGIN PAGE STYLES --- */
        #login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }
        .login-box {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
            text-align: center;
        }
        .login-box h2 { color: var(--accent-gold); margin-top: 0; }
        .login-input {
            width: 100%; box-sizing: border-box;
            background-color: #121212; border: 1px solid var(--border-color);
            color: white; padding: 10px; margin-bottom: 15px; border-radius: 4px;
        }
        .login-input:focus { outline: none; border-color: var(--accent-gold); }
        .btn-login {
            width: 100%; background-color: var(--accent-gold); color: var(--bg-color);
            border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        .btn-login:hover { background-color: #e5c158; }

        /* --- DASHBOARD STYLES --- */
        #dashboard-section { display: none; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
        }
        .header h1 { margin: 0; font-size: 20px; color: var(--accent-gold); letter-spacing: 1px; }
        .btn-logout {
            background-color: transparent; color: #e57373; border: 1px solid #e57373;
            padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        /* Filters Section */
        .filter-section {
            background-color: var(--card-bg); padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color); margin-bottom: 20px;
        }
        .filter-title { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; display: block; text-transform: uppercase; }
        .btn-group {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
        }
        .btn-filter {
            background-color: #121212; color: var(--text-main); border: 1px solid var(--border-color);
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s;
        }
        .btn-filter:hover { border-color: var(--accent-gold); }
        .btn-filter.active { background-color: var(--accent-gold); color: var(--bg-color); border-color: var(--accent-gold); font-weight: bold; }

        /* Area Filters (Hidden by default) */
        #area-filters-container { display: none; padding-top: 10px; border-top: 1px dashed var(--border-color); }

        /* KPI Dashboard Grid */
        .kpi-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;
        }
        .kpi-card {
            background-color: var(--card-bg); padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color); text-align: center;
            animation: glowHighlight 4s infinite alternate;
        }
        .kpi-card h3 { margin: 0 0 5px 0; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .kpi-card p { margin: 0; font-size: 20px; font-weight: bold; color: var(--text-main); }
        @keyframes glowHighlight {
            0% { box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.15); }
        }

        /* Table Styles */
        .table-container {
            background-color: var(--card-bg); border-radius: 8px;
            border: 1px solid var(--border-color); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #1a1a1a; color: var(--accent-gold); font-weight: 600; white-space: nowrap; }
        tr:hover { background-color: #2a2a2a; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-done { background-color: rgba(46, 125, 50, 0.2); color: #81c784; border: 1px solid #2e7d32; }
        .status-pending { background-color: rgba(198, 40, 40, 0.2); color: #e57373; border: 1px solid #c62828; }
        
        .btn-update {
            background-color: transparent; color: var(--accent-gold); border: 1px solid var(--accent-gold);
            padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        .btn-update:hover { background-color: var(--accent-gold); color: var(--bg-color); }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .kpi-container { gap: 8px; }
            .kpi-card { padding: 10px 5px; }
            .kpi-card h3 { font-size: 9px; }
            .kpi-card p { font-size: 14px; }
            table { font-size: 11px; }
            th, td { padding: 8px; }
            .btn-filter { padding: 6px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h2>SCAZP WEB PORTAL</h2>
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Sistem Kemaskini OSB & Findings</p>
            <input type="text" id="username" class="login-input" placeholder="User ID">
            <input type="password" id="password" class="login-input" placeholder="Password">
            <button class="btn-login" onclick="handleLogin()">LOG MASUK</button>
            <p id="login-error" style="color: #e57373; font-size: 12px; display: none; margin-top: 10px;">ID atau Password salah!</p>
        </div>
    </div>

    <div id="dashboard-section">
        <div class="header">
            <h1>Dashboard Pemantauan OSB</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="display-username" style="font-size: 12px; color: var(--text-muted);"></span>
                <button class="btn-logout" onclick="handleLogout()">Log Keluar</button>
            </div>
        </div>

        <div class="filter-section">
            <div id="region-filters-container">
                <span class="filter-title">Pilih Region</span>
                <div class="btn-group" id="region-buttons">
                    </div>
            </div>

            <div id="area-filters-container">
                <span class="filter-title">Pilih Area</span>
                <div class="btn-group" id="area-buttons">
                    </div>
            </div>
        </div>

        <div class="kpi-container">
            <div class="kpi-card"><h3>Total Akaun</h3><p id="kpi-total">0</p></div>
            <div class="kpi-card"><h3>Dah Update</h3><p id="kpi-done" style="color: #81c784;">0</p></div>
            <div class="kpi-card"><h3>Belum Update</h3><p id="kpi-pending" style="color: #e57373;">0</p></div>
            <div class="kpi-card"><h3>Total OSB (RM)</h3><p id="kpi-osb">0.00</p></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>REGION</th>
                        <th>AREA</th>
                        <th>LOC CD</th>
                        <th>ACCT</th>
                        <th>OSB (RM)</th>
                        <th>STATUS</th>
                        <th>TINDAKAN</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. MOCK DATA (Data Contoh dari Excel) ---
        const accountsData = [
            { region: 'NORTHWEST', area: 'IPOH AREA', loc: '8342', acct: '5923235', osb: 1200.50, status: 'BELUM' },
            { region: 'NORTHWEST', area: 'TAIPING AREA', loc: '8345', acct: '5923236', osb: 800.00, status: 'BELUM' },
            { region: 'MIDEAST', area: 'KUANTAN AREA', loc: '2059', acct: '8110090', osb: 3023.08, status: 'DAH UPDATE' },
            { region: 'NORTH', area: 'ALOR SETAR AREA', loc: '1100', acct: '1002938', osb: 5450.00, status: 'DAH UPDATE' },
            { region: 'NORTH', area: 'SUNGAI PETANI AREA', loc: '1105', acct: '1002939', osb: 150.00, status: 'BELUM' }
        ];

        // Definisi kawasan untuk setiap region
        const regionsMap = {
            'NORTH': ['ALOR SETAR AREA', 'SUNGAI PETANI AREA'],
            'NORTHWEST': ['IPOH AREA', 'TAIPING AREA', 'PENANG AREA'],
            'NORTHEAST': ['KOTA BHARU AREA'],
            'CENTRAL': ['KL AREA', 'SHAH ALAM AREA'],
            'MIDEAST': ['KUANTAN AREA', 'KEMAMAN AREA'],
            'SOUTH': ['JB AREA', 'MELAKA AREA'],
            'SABAH': ['KK AREA'],
            'SARAWAK': ['KUCHING AREA']
        };

        // --- 2. SISTEM LOGIN & ROLES ---
        const users = {
            'admin': { pass: '123', role: 'master' },
            'pic': { pass: '123', role: 'user', assignedAreas: ['IPOH AREA'] } // Cuma boleh akses Ipoh
        };

        let currentUser = null;
        let currentRegion = null;
        let currentArea = null;

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (users[user] && users[user].pass === pass) {
                currentUser = users[user];
                currentUser.username = user;
                
                document.getElementById('login-error').style.display = 'none';
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                document.getElementById('display-username').innerText = "Logged in as: " + user.toUpperCase();
                
                initDashboard();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function handleLogout() {
            currentUser = null; currentRegion = null; currentArea = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'flex';
        }

        // --- 3. LOGIK DASHBOARD & FILTER ---
        function initDashboard() {
            if (currentUser.role === 'master') {
                // Master nampak semua filter region
                document.getElementById('region-filters-container').style.display = 'block';
                document.getElementById('area-filters-container').style.display = 'none';
                renderRegionButtons();
                renderTable(accountsData); // Papar semua by default
            } else {
                // User biasa tak nampak Region, terus nampak Area dia sahaja
                document.getElementById('region-filters-container').style.display = 'none';
                document.getElementById('area-filters-container').style.display = 'block';
                renderUserAreaButtons(currentUser.assignedAreas);
                filterTableByArea(currentUser.assignedAreas[0]); // Auto load area pertama dia
            }
        }

        function renderRegionButtons() {
            const container = document.getElementById('region-buttons');
            container.innerHTML = '<button class="btn-filter active" onclick="selectAllRegions(this)">SEMUA REGION</button>';
            Object.keys(regionsMap).forEach(region => {
                container.innerHTML += `<button class="btn-filter" onclick="selectRegion('${region}', this)">${region}</button>`;
            });
        }

        function selectAllRegions(btnElement) {
            updateActiveButton('region-buttons', btnElement);
            document.getElementById('area-filters-container').style.display = 'none';
            currentRegion = null; currentArea = null;
            renderTable(accountsData);
        }

        function selectRegion(region, btnElement) {
            updateActiveButton('region-buttons', btnElement);
            currentRegion = region;
            currentArea = null; // Reset area
            
            // Tunjuk butang Area untuk region ni
            document.getElementById('area-filters-container').style.display = 'block';
            const areaContainer = document.getElementById('area-buttons');
            areaContainer.innerHTML = '<button class="btn-filter active" onclick="selectAllAreasInRegion(this)">SEMUA AREA DI ' + region + '</button>';
            
            regionsMap[region].forEach(area => {
                areaContainer.innerHTML += `<button class="btn-filter" onclick="selectArea('${area}', this)">${area}</button>`;
            });

            // Filter table untuk tunjuk data Region sahaja
            const filteredData = accountsData.filter(d => d.region === region);
            renderTable(filteredData);
        }

        function selectAllAreasInRegion(btnElement) {
            updateActiveButton('area-buttons', btnElement);
            currentArea = null;
            const filteredData = accountsData.filter(d => d.region === currentRegion);
            renderTable(filteredData);
        }

        function selectArea(area, btnElement) {
            updateActiveButton('area-buttons', btnElement);
            currentArea = area;
            filterTableByArea(area);
        }

        function filterTableByArea(area) {
            const filteredData = accountsData.filter(d => d.area === area);
            renderTable(filteredData);
        }

        function renderUserAreaButtons(areas) {
            const container = document.getElementById('area-buttons');
            container.innerHTML = '';
            areas.forEach((area, index) => {
                let activeClass = index === 0 ? 'active' : '';
                container.innerHTML += `<button class="btn-filter ${activeClass}" onclick="selectArea('${area}', this)">${area}</button>`;
            });
        }

        function updateActiveButton(containerId, activeBtn) {
            let btns = document.getElementById(containerId).getElementsByClassName('btn-filter');
            for(let btn of btns) { btn.classList.remove('active'); }
            activeBtn.classList.add('active');
        }

        // --- 4. RENDER JADUAL & KPI ---
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            let countDone = 0; let totalOsb = 0;

            data.forEach(row => {
                let statusHtml = row.status === 'DAH UPDATE' 
                    ? '<span class="status-done">DAH UPDATE</span>' 
                    : '<span class="status-pending">BELUM</span>';
                
                if(row.status === 'DAH UPDATE') countDone++;
                totalOsb += row.osb;

                tbody.innerHTML += `
                    <tr>
                        <td>${row.region}</td>
                        <td>${row.area}</td>
                        <td>${row.loc}</td>
                        <td>${row.acct}</td>
                        <td>${row.osb.toFixed(2)}</td>
                        <td>${statusHtml}</td>
                        <td><button class="btn-update">KEMASKINI</button></td>
                    </tr>
                `;
            });

            // Update KPI
            document.getElementById('kpi-total').innerText = data.length;
            document.getElementById('kpi-done').innerText = countDone;
            document.getElementById('kpi-pending').innerText = data.length - countDone;
            document.getElementById('kpi-osb').innerText = (totalOsb / 1000).toFixed(2) + 'K'; // Format ringkas K
        }
    </script>
</body>
</html>
