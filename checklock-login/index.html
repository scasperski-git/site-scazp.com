<!DOCTYPE html>
<html lang="ms">
<head>
    <title>Secure Login Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e3c72, #2a5298, #1e293b);
            background-size: 400% 400%;
            animation: bgMove 15s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        .box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            animation: premiumFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes premiumFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 48px;
            color: #1e3c72;
            margin-bottom: 15px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.5px;
        }

        .login-sub {
            font-size: 14px;
            color: #64748b;
            margin-top: 5px;
        }

        /* INPUT STYLING */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group i.left {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #f8fafc;
        }

        .input-group input:focus {
            border-color: #3a7bd5;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(58, 123, 213, 0.1);
        }

        .input-group input:focus + i.left {
            color: #3a7bd5;
        }

        .toggle-pass {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }

        /* BUTTON STYLING */
        button {
            width: 100%;
            padding: 16px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #2a5298;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(30, 60, 114, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* ERROR MESSAGE */
        #errorMsg {
            background: #fff1f2;
            color: #e11d48;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            border: 1px solid #fecdd3;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* OVERLAY LOADING */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3a7bd5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="login-header">
            <i class="fa-solid fa-circle-user"></i>
            <div class="login-title">Selamat Datang</div>
            <div class="login-sub">Log masuk ke akaun anda</div>
        </div>

        <div id="errorMsg"></div>

        <div class="input-group">
            <input id="user" type="text" placeholder="User ID" autocomplete="off">
            <i class="fa fa-user left"></i>
        </div>

        <div class="input-group">
            <input id="pass" type="password" placeholder="Password">
            <i class="fa fa-lock left"></i>
            <i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
        </div>

        <button id="loginBtn" onclick="login()">Log Masuk</button>
    </div>

    <div id="overlay">
        <div class="spinner"></div>
        <div style="font-weight: 600;">Mengesahkan...</div>
    </div>

    <script src="../lockconfig.js"></script>

    <script>
        const api = API_URL;
        const userInput = document.getElementById("user");
        const passInput = document.getElementById("pass");
        const loginBtn = document.getElementById("loginBtn");

        // Focus pada username masa mula-mula buka
        userInput.focus();

        // 1. FUNGSI TEKAN ENTER UNTUK LOGIN
        [userInput, passInput].forEach(input => {
            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    login();
                }
            });
        });

        function togglePass() {
            const icon = document.querySelector(".toggle-pass");
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        async function login() {
            const user = userInput.value.trim();
            const pass = passInput.value.trim();
            const err = document.getElementById("errorMsg");
            const overlay = document.getElementById("overlay");

            err.style.display = "none";

            if (!user || !pass) {
                showError("Sila masukkan ID dan Password");
                return;
            }

            // Papar loading overlay
            overlay.style.display = "flex";

            try {
                const res = await fetch(api, {
                    method: "POST",
                    body: new URLSearchParams({
                        action: "login",
                        user: user,
                        pass: pass,
                        api_key: "SCZP_SECURE_2026"
                    })
                });

                const data = await res.json();

                if (data.status === "SUCCESS") {
                    localStorage.setItem("session_token", data.token);
                    localStorage.setItem("lock_user", data.user);
                    // ... (simpan data lain macam asal)
                    
                    // Redirect mengikut jenis user
                    const routes = { "check": "../check/", "lock": "../lock/", "master": "../menumaster/" };
                    window.location.href = routes[data.type] || "../";
                } else {
                    showError(data.status === "INACTIVE" ? "Akaun tidak aktif" : "ID atau Password salah");
                    overlay.style.display = "none";
                }

            } catch (e) {
                showError("Ralat sistem. Cuba sebentar lagi.");
                overlay.style.display = "none";
            }
        }

        function showError(msg) {
            const err = document.getElementById("errorMsg");
            err.innerText = msg;
            err.style.display = "block";
        }
    </script>
</body>
</html>
