<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agency Contact Info Submission</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ===== BASE THEME ===== */
:root {
  --bg-color: #0a0a0a;
  --card-bg: #141414;
  --text-main: #f5f5f5;
  --text-muted: #888888;
  --accent-gold: #d4af37;
  --accent-gold-dim: rgba(212, 175, 55, 0.15);
  --border-color: #2a2a2a;
  --error: #ef4444;
}

html, body { 
  height: 100%; 
  margin: 0; 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: var(--bg-color);
  color: var(--text-main);
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== CONTAINER ===== */
.container {
  width: 100%;
  max-width: 500px;
  background: var(--card-bg);
  padding: 32px 36px;
  border-radius: 16px;
  border: 1px solid var(--border-color);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
  position: relative;
  animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}

/* ===== HEADER ===== */
.form-header {
  text-align: center;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
}

.logo {
  width: 54px;
  height: 54px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: linear-gradient(135deg, #222, #111);
  border: 1px solid var(--accent-gold);
  box-shadow: 0 0 20px var(--accent-gold-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent-gold);
}

.subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.5px;
}

/* ===== SECTION TITLE ===== */
.section-title {
  margin: 24px 0 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
}
.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border-color);
  margin-left: 12px;
}

/* ===== GRID LAYOUT (RESPONSIVE) ===== */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 500px) {
  .grid-2 { grid-template-columns: 1fr; gap: 0; }
  .container { padding: 24px 20px; }
}

/* ===== INPUTS ===== */
.input-group {
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
}

label { 
  font-size: 12px; 
  color: #a3a3a3; 
  font-weight: 500; 
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}
.req { color: var(--accent-gold); }

.input-wrap { 
  position: relative;
  transition: all 0.3s ease;
  border-radius: 8px;
}

/* Auto-highlighting animation on focus */
.input-wrap:focus-within {
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.4);
}

.input-wrap span {
  position: absolute;
  left: 14px; 
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.5;
  transition: opacity 0.3s;
}

.input-wrap:focus-within span {
  opacity: 1;
  color: var(--accent-gold);
}

input {
  width: 100%;
  padding: 14px 14px 14px 40px;
  background: #0f0f0f;
  color: var(--text-main);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 13px;
  box-sizing: border-box;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

::placeholder { text-transform: none; color: #555; }

input:hover { border-color: #444; }

input:focus {
  border-color: var(--accent-gold);
  background: #111;
  outline: none;
  box-shadow: inset 0 0 0 1px var(--accent-gold);
}

input.error { border-color: var(--error); }
.errorText {
  font-size: 11px;
  color: var(--error);
  display: none;
  margin-top: 6px;
}

/* ===== CONSENT CARD ===== */
.consent-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  margin: 24px 0;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: #0f0f0f;
  cursor: pointer;
  transition: border 0.3s ease;
}

.consent-card:hover { border-color: #555; }
.consent-card input { display: none; }

.checkmark {
  width: 18px;
  height: 18px;
  border: 1px solid #666;
  border-radius: 4px;
  position: relative;
  flex-shrink: 0;
  transition: all 0.2s ease;
}

.checkmark::after {
  content: "";
  position: absolute;
  left: 5px; top: 1px;
  width: 4px; height: 10px;
  border: solid #000;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) scale(0);
  opacity: 0;
  transition: all 0.2s ease;
}

.consent-card input:checked + .checkmark {
  background: var(--accent-gold);
  border-color: var(--accent-gold);
}

.consent-card input:checked + .checkmark::after {
  opacity: 1; transform: rotate(45deg) scale(1);
}

.consent-text { font-size: 12px; color: #999; line-height: 1.5; }
.consent-card input:checked ~ .consent-text { color: var(--text-main); }

/* ===== BUTTON ===== */
button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #111;
  background: #333;
  cursor: not-allowed;
  transition: all 0.4s ease;
}

button.enabled {
  background: var(--accent-gold);
  cursor: pointer;
  box-shadow: 0 4px 15px var(--accent-gold-dim);
}

button.enabled:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
}

/* ===== SUMMARY & SUCCESS ===== */
.success-container { text-align: center; display: none; }
.successIcon {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: var(--accent-gold-dim);
  border: 1px solid var(--accent-gold);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-gold);
  font-size: 28px;
}
.ref {
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--accent-gold);
  margin-bottom: 24px;
  font-weight: 600;
}
.summary { text-align: left; margin-bottom: 24px; }
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-color);
  font-size: 13px;
}
.summary-label { color: var(--text-muted); }
.summary-val { color: var(--text-main); font-weight: 500; text-align: right; }

/* ===== FOOTER ===== */
.footer {
  margin-top: 32px;
  text-align: center;
  font-size: 11px;
  color: #555;
  letter-spacing: 0.5px;
}
.footer a { color: var(--accent-gold); text-decoration: none; }

/* ===== PROCESSING OVERLAY ===== */
#processingOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10, 10, 10, 0.9);
  backdrop-filter: blur(4px);
  z-index: 999; display: none;
  align-items: center; justify-content: center; flex-direction: column;
}
.spinner {
  width: 40px; height: 40px;
  border: 2px solid #333; border-top: 2px solid var(--accent-gold);
  border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
}
.processingText { color: var(--accent-gold); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<script>
var FORM_ENABLED = true;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMtm1R2Geo-MpMtKSoWVvu9y3s0tYBxMwyaP2krcHl1lau8dRGjwCvClB3J_fXhbw7/exec";
</script>

<div class="container" id="formBox">
  <div class="form-header">
    <div class="logo">⚜️</div>
    <div class="title">Agency Registration</div>
    <div class="subtitle">Secure Communication Portal</div>
  </div>

  <form onsubmit="return submitForm();">
    <div class="section-title">Corporate Information</div>

    <div class="input-group">
      <label>Agency Name <span class="req">*</span></label>
      <div class="input-wrap"><span>🏢</span>
        <input type="text" id="agency" placeholder="e.g. ABC DEBT SDN BHD">
      </div>
      <div class="errorText" id="err_agency">Agency Name is required</div>
    </div>

    <div class="grid-2">
      <div class="input-group">
        <label>Officer 1 <span class="req">*</span></label>
        <div class="input-wrap"><span>👤</span>
          <input type="text" id="pic1" placeholder="e.g. JOHN DOE">
        </div>
        <div class="errorText" id="err_pic1">Required</div>
      </div>
      <div class="input-group">
        <label>Officer 2 (Optional)</label>
        <div class="input-wrap"><span>👤</span>
          <input type="text" id="pic2" placeholder="e.g. JANE DOE">
        </div>
      </div>
    </div>

    <div class="section-title">Contact Details</div>

    <div class="grid-2">
      <div class="input-group">
        <label>Primary Contact <span class="req">*</span></label>
        <div class="input-wrap"><span>📞</span>
          <input type="tel" inputmode="numeric" id="contact1" placeholder="0123456789" oninput="formatPhone(this)">
        </div>
        <div class="errorText" id="err_contact1">Required</div>
        <div class="errorText" id="err_contact1_format">Must start with 0</div>
      </div>
      
      <div class="input-group">
        <label>Secondary Contact</label>
        <div class="input-wrap"><span>📞</span>
          <input type="tel" inputmode="numeric" id="contact2" placeholder="0123456789" oninput="formatPhone(this)">
        </div>
        <div class="errorText" id="err_contact2_format">Must start with 0</div>
      </div>
    </div>

    <div class="input-group">
      <label>WhatsApp Number <span class="req">*</span></label>
      <div class="input-wrap"><span>💬</span>
        <input type="tel" inputmode="numeric" id="whatsapp" placeholder="0123456789" oninput="formatPhone(this)">
      </div>
      <div class="errorText" id="err_whatsapp">Required</div>
      <div class="errorText" id="err_whatsapp_format">Must start with 0</div>
    </div>

    <label class="consent-card">
      <input type="checkbox" id="consent" onchange="updateState()">
      <span class="checkmark"></span>
      <span class="consent-text">I hereby confirm the accuracy of the provided information and authorize its use for official records.</span>
    </label>

    <button type="submit" id="submitBtn">Authorize Submission</button>
  </form>

  <div class="footer">
    © <span id="year"></span> <a href="https://sczpnet.org" target="_blank">SCAZP.COM</a> PORTAL. ALL RIGHTS RESERVED.
  </div>
</div>

<div class="container success-container" id="successBox">
  <div class="successIcon">✓</div>
  <div class="title" style="margin-bottom:20px;">Registration Authorized</div>
  <div class="ref" id="refDisplay"></div>
  
  <div class="summary" id="summaryBox"></div>
  
  <button type="button" class="enabled" onclick="location.reload()" style="margin-top: 10px;">Return Home</button>
</div>

<div id="processingOverlay">
  <div class="spinner"></div>
  <div class="processingText">Authenticating...</div>
</div>

<script>
window.onload = function() {
  document.getElementById("year").innerText = new Date().getFullYear();
};

const mandatoryFields = [
  {id:"agency", err:"err_agency"},
  {id:"pic1", err:"err_pic1"},
  {id:"contact1", err:"err_contact1"},
  {id:"whatsapp", err:"err_whatsapp"}
];

mandatoryFields.forEach(f => {
  const el = document.getElementById(f.id);
  if(el){
    el.addEventListener("input", () => updateState(false));
    el.addEventListener("blur", () => updateState(true));
  }
});

["contact1","contact2","whatsapp"].forEach(id => {
  const el = document.getElementById(id);
  if(el) el.addEventListener("keydown", blockNonNumeric);
});

function formatPhone(el) {
  let raw = el.value.replace(/\D/g,'');
  const errId = el.id + "_format";
  const errEl = document.getElementById(errId);
  
  if(errEl) errEl.style.display = "none";
  el.classList.remove("error");

  if(!raw) return;
  if(!raw.startsWith("0")) {
    if(errEl) errEl.style.display = "block";
    el.classList.add("error");
    return;
  }

  if(raw.startsWith("01")) {
    el.value = raw.length <= 10 ? raw.replace(/(\d{3})(\d+)/,"$1-$2") : raw.replace(/(\d{3})(\d{4})(\d+)/,"$1-$2$3");
  } else {
    el.value = raw.replace(/(\d{2})(\d+)/,"$1-$2");
  }
}

function blockNonNumeric(e) {
  if(!/[0-9]/.test(e.key) && !["Backspace","Delete","ArrowLeft","ArrowRight","Tab"].includes(e.key)){
    e.preventDefault();
  }
}

function updateState(showErrors=false) {
  let ok = true;
  mandatoryFields.forEach(f => {
    const i = document.getElementById(f.id);
    const e = document.getElementById(f.err);
    if(!i.value.trim()){
      ok = false;
      if(showErrors) { i.classList.add("error"); e.style.display = "block"; }
    } else {
      i.classList.remove("error"); e.style.display = "none";
    }
  });

  ["contact1","whatsapp"].forEach(id => {
    const el = document.getElementById(id);
    if(el.value && !el.value.trim().startsWith("0")){
      ok = false;
      if(showErrors) el.classList.add("error");
    }
  });

  if(ok && consent.checked){
    submitBtn.disabled = false;
    submitBtn.classList.add("enabled");
  } else {
    submitBtn.disabled = true;
    submitBtn.classList.remove("enabled");
  }
}

function submitForm() {
  updateState(true);
  if(submitBtn.disabled) return false;
  
  document.getElementById("processingOverlay").style.display = "flex";
  
  const ref = generateRef();
  const data = new URLSearchParams();
  data.append("ref", ref);
  data.append("agency", agency.value.toUpperCase());
  data.append("pic1", pic1.value.toUpperCase());
  data.append("pic2", pic2.value.toUpperCase());
  data.append("contact1", contact1.value);
  data.append("contact2", contact2.value);
  data.append("whatsapp", whatsapp.value);
  data.append("consent", "YES");
  data.append("update", "NO");

  fetch(SCRIPT_URL, {method:"POST", body:data})
  .then(r=>r.json())
  .then(res=>{
    document.getElementById("processingOverlay").style.display = "none";
    if(res.status === "DUPLICATE" && confirm("Agency record exists. Update?")){
      document.getElementById("processingOverlay").style.display = "flex";
      data.set("update", "YES");
      fetch(SCRIPT_URL, {method:"POST", body:data}).then(r=>r.json()).then(res2=>{
        document.getElementById("processingOverlay").style.display = "none";
        showSuccess(res2.ref, res2.updateInfo || "UPDATED");
      });
      return;
    }
    showSuccess(res.ref, "NEW SUBMISSION");
  });
  return false;
}

function showSuccess(ref, status) {
  formBox.style.display = "none";
  successBox.style.display = "block";
  refDisplay.innerText = "REF: " + ref;
  
  summaryBox.innerHTML = `
    <div class="summary-row"><span class="summary-label">AGENCY</span><span class="summary-val">${agency.value.toUpperCase()}</span></div>
    <div class="summary-row"><span class="summary-label">OFFICER 1</span><span class="summary-val">${pic1.value.toUpperCase()}</span></div>
    <div class="summary-row"><span class="summary-label">CONTACT</span><span class="summary-val">${contact1.value}</span></div>
    <div class="summary-row"><span class="summary-label">STATUS</span><span class="summary-val" style="color:var(--accent-gold)">${status}</span></div>
  `;
}

function generateRef() {
  const d = new Date();
  let agy = agency.value.trim().split(/\s+/)[0].replace(/[^A-Z0-9]/gi,"").toUpperCase() || "AGY";
  return agy + "-" + d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}
</script>
</body>
</html>
