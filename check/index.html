<!DOCTYPE html>
<html>

<head>

<title>Check Lock Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

/* ===== NATIVE APP FEEL (BONUS) ===== */
* {
    -webkit-tap-highlight-color: transparent;
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-track {
    background: transparent; 
}
::-webkit-scrollbar-thumb {
    background: #cbd5e1; 
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: #94a3b8; 
}

html {
    scroll-behavior: smooth;
}

/* ===== BASE & TYPOGRAPHY ===== */
*{
    box-sizing: border-box;
    font-family: 'Poppins', Arial, sans-serif;
}

html {
    font-size: clamp(14px, 1.1vw, 16px);
}

body {
    background: #1e293b !important;
    margin: 0;
    padding: 0;
    color: #334155;
    min-height: 100vh;
}

@keyframes slideUpFade {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== APP LAYOUT (DESKTOP SIDEBAR) ===== */
.app-layout {
    display: flex;
    min-height: 100vh;
    background: #f1f5f9;
}

.sidebar {
    width: 280px;
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    color: white;
    display: flex;
    flex-direction: column;
    padding: 45px 20px 16px 20px;
    position: fixed;
    height: 100vh;
    left: 0;
    top: 0;
    z-index: 50;
    box-shadow: 4px 0 15px rgba(0,0,0,0.1);
}

.brand {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
}

.brand i {
    color: #3b82f6;
    font-size: 24px;
}

.user-profile {
    background: rgba(255, 255, 255, 0.05);
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

#userInfo {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    line-height: 1.4;
}

.nav-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
}

.nav-btn {
    width: 100%;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: transparent;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    transition: all 0.3s ease;
}

.nav-btn i {
    font-size: 18px;
    width: 24px;
    text-align: center;
}

.nav-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    transform: translateX(4px);
}

.nav-btn.active {
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}

.logout-btn { 
    margin-top: auto;
    color: #fca5a5 !important;
}
.logout-btn:hover {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444 !important;
}

.paid-btn {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    transition: all 0.3s ease;
}
.paid-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
}

.main-content {
    flex: 1;
    margin-left: 280px; 
    padding: 16px 40px 40px 40px; 
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.container {
    width: 100%;
    max-width: 700px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
    animation: slideUpFade 0.5s ease forwards;
    padding: 24px 32px 32px 32px; 
    transition: max-width 0.4s ease;
}

body.list-mode .container {
    max-width: 100%;
}

.form-title {
    font-size: 20px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid #f1f5f9;
}

/* ===== TABLE HEADER & ACTIONS (NEW) ===== */
.table-header-row {
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 16px; 
    margin-top: 10px;
}

.table-header-title {
    font-size: 14px; 
    font-weight: 600; 
    color: #1e293b;
}

.table-actions {
    display: flex; 
    gap: 10px;
}

.search-bar-row {
    display: flex;
    gap: 16px;
    align-items: stretch; 
    margin-bottom: 10px;
}

.search-bar-row input {
    width: 280px;
    flex: 0 0 280px;
    padding: 16px 20px;
    font-size: 15px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    outline: none;
    transition: 0.3s;
    background: #f8fafc;
    color: #1e293b;
    text-align: center;
    letter-spacing: 1px;
    font-weight: 600;
}

.search-bar-row input:focus {
    background: #ffffff;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

.button-group {
    display: flex;
    gap: 12px;
    flex: 1; 
}

.button-group button {
    flex: 1;
    padding: 0 20px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.check-btn {
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    color: white;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
}

.check-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
}

.reset-btn {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #e2e8f0;
}

.reset-btn:hover {
    background: #e2e8f0;
    color: #1e293b;
}

.tab-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid #e2e8f0;
    background: white;
    color: #64748b;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.tab-btn:hover {
    background: #f8fafc;
    color: #4f46e5;
    border-color: #cbd5e1;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
}

.tab-btn.active {
    background: #4f46e5;
    color: white;
    border-color: #4f46e5;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}

.tab-btn.active:hover {
    background: #4338ca;
    color: white;
    transform: translateY(-2px);
}

.table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    margin-top: 10px;
    max-height: 60vh;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

table th, table td {
    padding: 16px;
    border-bottom: 1px solid #e2e8f0;
    text-align: left;
}

table th {
    position: sticky !important; 
    top: 0; 
    z-index: 10; 
    background: #f8fafc !important; 
    box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-weight: 600;
    font-size: 12px;
    color: #64748b;
    text-transform: uppercase;
}

table th:hover { background: #f1f5f9 !important; }
table tbody tr:nth-child(even) { background-color: #f8fafc; }
table tbody tr:nth-child(odd) { background-color: #ffffff; }
table tbody tr:hover td { background-color: #e2e8f0; } 

th:nth-child(4), td:nth-child(4) {
    text-align: center;
    font-weight: 600;
}
th:nth-child(4), td:nth-child(4) {
    white-space: nowrap;
}

.pagination-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    background: #f8fafc;
    padding: 10px;
    border-radius: 12px;
}

.page-btn {
    padding: 10px 18px;
    font-size: 13px;
    border-radius: 8px;
    background: white;
    border: 1px solid #e2e8f0;
    color: #4f46e5;
    cursor: pointer;
}
.page-btn:disabled { color: #94a3b8; cursor: not-allowed; }
#pageInfo { flex: 1; text-align: center; font-weight: 600; font-size: 13px; }

/* ===== BUTTON REFRESH (TEAL) ===== */
.btn-refresh-premium {
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 6px rgba(14, 165, 233, 0.2);
}
.btn-refresh-premium:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(14, 165, 233, 0.4);
    background: linear-gradient(135deg, #0284c7, #0369a1);
}
.btn-refresh-premium:active { transform: translateY(0); box-shadow: none; }
.btn-refresh-premium:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== BUTTON EXPORT (HIJAU) ===== */
.btn-export {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
    box-shadow: 0 4px 6px rgba(34, 197, 94, 0.2);
}
.btn-export:hover {
    background: linear-gradient(135deg, #16a34a, #15803d);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(34, 197, 94, 0.4);
}
.btn-export:active { transform: translateY(0); box-shadow: none; }

/* ===== BUTTON RESET (KELABU) ===== */
.btn-reset-small {
    background: linear-gradient(135deg, #64748b, #475569);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
    box-shadow: 0 4px 6px rgba(100, 116, 139, 0.2);
}
.btn-reset-small:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(100, 116, 139, 0.4);
    background: linear-gradient(135deg, #475569, #334155);
}

.result-card {
    margin-top: 24px;
    padding: 24px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.04);
    animation: fadeIn 0.4s ease forwards;
    width: 100%;
}
.status-box { text-align: center; margin-bottom: 16px; }
.status-box span {
    display: inline-block; padding: 8px 24px; color: white;
    font-weight: 700; font-size: 14px; border-radius: 30px; letter-spacing: 1px;
}
.created-meta { font-size: 12px; color: #64748b; text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px dashed #e2e8f0; }
.row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 16px; }
.col { flex: 1; word-break: break-word; }
.label { font-weight: 600; color: #64748b; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.value { font-size: 15px; font-weight: 600; color: #0f172a; }
.amount { font-size: 24px; font-weight: 700; color: #0f172a; letter-spacing: 0.5px; }
.remark { margin-top: 6px; line-height: 1.5; font-size: 13px; color: #334155; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }

.no-lock {
    margin-top: 24px; padding: 24px; background: #fef2f2; border: 1px solid #fecdd3;
    border-radius: 16px; text-align: center; font-weight: 600; color: #be123c;
    display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%;
}
.no-lock::before { content: '\f071'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 24px; color: #ef4444; }

.loading { margin-top: 30px; text-align: center; font-weight: 600; color: #475569; width: 100%; }
.spinner {
    margin: 16px auto 0; width: 40px; height: 40px; border: 4px solid #f1f5f9;
    border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.icon-spin { animation: spin 1s linear infinite; }

#sessionPopup {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none;
    align-items: center; justify-content: center; z-index: 9999;
}
.session-box {
    background: white; padding: 40px; border-radius: 20px; text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-width: 340px; width: 90%;
}
.session-box i { font-size: 48px; color: #ef4444; margin-bottom: 16px; }
.session-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #0f172a; }

.resizer {
    position: absolute; 
    top: 0; 
    right: 0; 
    width: 6px; 
    cursor: col-resize; 
    user-select: none; 
    height: 100%; 
    border-right: 1px solid #cbd5e1;
}
.resizer:hover, .resizer.resizing { border-right: 2px solid #4f46e5; }
.sort-icon { margin-left: 6px; color: #94a3b8; font-size: 11px; }

/* ==========================================
   MOBILE RESPONSIVE (BOTTOM NAV STYLE)
   ========================================== */
@media (max-width: 899px) {
    body { overflow: visible; }
    .app-layout { flex-direction: column; height: auto; }
    
    .sidebar {
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        flex-direction: row; justify-content: space-between;
        align-items: center; padding: 10px 16px; 
        border-radius: 0 0 16px 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 60;
    }

    .brand { margin-bottom: 0; font-size: 18px; }
    .brand i { font-size: 20px; }
    .user-profile { margin-bottom: 0; text-align: right; background: transparent; border: none; padding: 0; }
    #userInfo { font-size: 12px; }

    .nav-menu {
        position: fixed; bottom: 0; left: 0; width: 100%;
        flex-direction: row; background: #ffffff;
        padding: 6px 10px 8px 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        z-index: 60; border-radius: 20px 20px 0 0; justify-content: space-around; gap: 5px; height: 60px; 
    }
    .nav-btn { flex-direction: column; gap: 4px; padding: 4px; color: #64748b; border-radius: 12px; justify-content: center; }
    .nav-btn i { font-size: 18px; } 
    .nav-btn span { display: block; font-size: 9px; font-weight: 600; } 
    .nav-btn:hover { transform: none; background: #f1f5f9; color: #4f46e5; }
    .nav-btn.active { background: #eef2ff; color: #4f46e5; box-shadow: none; }
    .logout-btn { margin-top: 0; color: #ef4444; }

    .main-content {
        margin-left: 0; margin-top: 60px; padding: 16px 15px 80px 15px; 
        height: auto; overflow: visible;
    }

    .container {
        height: auto; min-height: auto; padding: 20px 16px; 
        border-radius: 16px; overflow-y: visible;
    }

    /* Betulkan susunan butang jadual di Mobile */
    .table-header-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 16px;
    }
    
    .table-actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    
    .table-actions button:nth-child(1) {
        grid-column: 1 / -1;
        justify-content: center;
        padding: 12px;
        font-size: 13px;
    }
    
    .table-actions button:nth-child(2),
    .table-actions button:nth-child(3) {
        justify-content: center;
        padding: 10px;
        font-size: 11px;
    }

    .search-bar-row, .filter-input-group { flex-direction: column; gap: 16px; }
    .search-bar-row input, .filter-input-group input { width: 100%; flex: none; }
    .button-group, .mini-actions { flex-direction: column; width: 100%; }
    .button-group button, .mini-btn { padding: 14px; width: 100%; }

    .row { flex-direction: row; gap: 10px; }
    .value { font-size: 13px; }
    .amount { font-size: 20px; }
    .result-card, .no-lock, .loading { padding: 16px; }
    
    table th, table td { padding: 14px 10px; font-size: 11px; }
}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDKiYl8462c8ZanXc4oXIfa-_9su3E89Wk",
    authDomain: "lockcheck-e0160.firebaseapp.com",
    projectId: "lockcheck-e0160",
    storageBucket: "lockcheck-e0160.firebasestorage.app",
    messagingSenderId: "912034602664",
    appId: "1:912034602664:web:f23b971b67a0ef1df8ac9d",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.query = query;
  window.where = where;
  window.getDocs = getDocs;
  window.updateDoc = updateDoc;
  window.doc = doc;
</script>

</head>

<body>

<div class="app-layout">

    <nav class="sidebar">
        <div class="brand">
            <img src="../singer-logo-png-5.png" alt="Singer Logo" style="width: 28px; height: auto; object-fit: contain;"> Lock Portal
        </div>
        
        <div class="user-profile">
            <div id="userInfo"></div>
        </div>
        
        <div class="nav-menu">
            <button class="nav-btn active" id="navCheckLock" onclick="goCheckLock()">
                <i class="fa fa-magnifying-glass"></i> <span>Check Lock</span>
            </button>

            <button class="nav-btn" id="navViewRecords" onclick="viewRecords()">
                <i class="fa fa-list-check"></i> <span>View Records</span>
            </button>
            
            <button id="masterBtn" class="nav-btn" onclick="goMaster()" style="display:none">
                <i class="fa-solid fa-crown"></i> <span>Master Menu</span>
            </button>
            
            <button class="nav-btn logout-btn" onclick="logout()">
                <i class="fa fa-power-off"></i> <span>Logout</span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            
            <div id="searchSection">
                <div class="form-title">Check Lock Status</div>

                <div class="search-bar-row">
                    <input
                        type="text"
                        id="acc_no"
                        autocomplete="off"
                        inputmode="numeric"
                        maxlength="10"
                        placeholder="ENTER ACCOUNT NO">

                    <div class="button-group">
                        <button class="check-btn" id="checkBtn">
                            <i class="fa fa-search"></i> Check Lock
                        </button>
                        <button class="reset-btn" id="resetBtn">
                            <i class="fa fa-rotate-left"></i> New Search
                        </button>
                    </div>
                </div>

                <div id="result"></div>
            </div>

            <div id="listSection" style="display:none;">
                <div class="form-title" style="margin-bottom: 15px;">All Records</div>

                <div class="tab-container">
                    <button id="tabActive" class="tab-btn active" onclick="switchView('LOCK')">Active Locks</button>
                    <button id="tabPaid" class="tab-btn" onclick="switchView('PAID')">Paid History</button>
                    <button id="tabAll" class="tab-btn" onclick="switchView('ALL')">View All</button>
                </div>

                <div class="table-header-row">
                    <div class="table-header-title">
                        <i class="fa fa-list-check" style="color: #4f46e5; margin-right: 5px;"></i> Record List
                    </div>
                    
                    <div class="table-actions">
                        <button class="btn-refresh-premium" id="btnReloadTable" onclick="manualTableRefresh()">
                            <i class="fa-solid fa-arrows-rotate" id="reloadIcon"></i> Reload Data
                        </button>
                        <button class="btn-export" onclick="exportToExcel()">
                            <i class="fa fa-file-excel"></i> Export Excel
                        </button>

function formatDate(dateStr){
    if(!dateStr) return "-";
    if(dateStr.includes("-") && dateStr.split("-")[0].length==4){
        var p=dateStr.split("-"); var year=p[0]; var month=parseInt(p[1])-1; var day=p[2];
        var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return day+" "+m[month]+" "+year;
    }
    if(dateStr.includes("/")){
        var p=dateStr.split("/"); var day=parseInt(p[0]); var month=parseInt(p[1])-1; var year=p[2];
        var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return ("0"+day).slice(-2)+" "+m[month]+" "+year;
    }
    if(dateStr.includes("T")){
        var d=new Date(dateStr); var day=("0"+d.getDate()).slice(-2); var month=d.getMonth(); var year=d.getFullYear();
        var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return day+" "+m[month]+" "+year;
    }
    return dateStr;
}

function formatDateTime(dateStr){
    if(!dateStr) return "-";
    
    if(dateStr.includes("T")){
        try {
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr;
            
            const day = ("0" + d.getDate()).slice(-2);
            const mths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            const mth = mths[d.getMonth()];
            const yr = d.getFullYear();
            
            let hr = d.getHours();
            const min = ("0" + d.getMinutes()).slice(-2);
            const ampm = hr >= 12 ? 'PM' : 'AM';
            hr = hr % 12; 
            hr = hr ? hr : 12; 
            
            return day + " " + mth + " " + yr + " " + hr + ":" + min + " " + ampm;
        } catch(e) {
            return dateStr;
        }
    }
    
    const parts = dateStr.split(" ");
    if(parts.length < 2) return dateStr;
    const datePart = parts[0].split("/"); const timePart = parts[1].split(":");
    const day = datePart[0]; const monthIndex = parseInt(datePart[1]) - 1; const year = datePart[2];
    const hour = timePart[0]; const minute = timePart[1];
    const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return day+" "+m[monthIndex]+" "+year+" "+hour+":"+minute;
}

async function checkLock(){
    const acc = input.value.trim();
    if(!acc){ alert("Enter Account No"); input.focus(); return; }
    if(isLoading) return;

    verifySessionWithServer();
    const currentToken = localStorage.getItem("session_token") || sessionStorage.getItem("session_token");
    if(!currentToken) return; 

    isLoading = true; checkBtn.disabled = true;
    result.innerHTML = "<div class='loading'>Checking Lock Status<div class='spinner'></div></div>";

    try {
        const q = window.query(window.collection(window.db, "LOCK_DATA"), window.where("acc_no", "==", acc));
        const querySnapshot = await window.getDocs(q);

        if (querySnapshot.empty) {
            result.innerHTML = "<div class='no-lock'>NO LOCK FOUND</div>";
            checkBtn.disabled = false; isLoading = false;
            return;
        }

        let docId = "";
        let data = null;
        querySnapshot.forEach((doc) => {
            docId = doc.id; 
            data = doc.data();
        });

        if (data.status === "LOCK" || data.status === "PAID") {
            const formattedDate = formatDate(data.promise_date);
            const created = formatDateTime(data.created_at);
            const amount = "RM " + Number(data.amount || 0).toLocaleString("en-MY", { minimumFractionDigits:2, maximumFractionDigits:2 });

            const promiseDate = new Date(data.promise_date);
            const today = new Date();
            today.setHours(0,0,0,0); promiseDate.setHours(0,0,0,0);

            let isPaid = (data.status === "PAID");
            let statusText = isPaid ? "ALREADY PAID" : "LOCKED";
            let statusColor = isPaid ? "#10b981" : "#f59e0b"; 

            if (!isPaid && today > promiseDate) { 
                statusText = "EXPIRED"; statusColor = "#ef4444";
            }

            let paidByInfo = (isPaid && data.paid_by) 
                ? `<div style='margin-top: 14px;'><span style='background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-block; letter-spacing: 0.3px;'><i class='fa-solid fa-check-double' style='margin-right: 4px;'></i> Verified Paid by ${data.paid_by}</span></div>` 
                : "";

            // =====================================
            // BINA BLOK INFO "LOCKED BY" & "EDITED BY"
            // =====================================
            let metaSection = `<div class='created-meta' style='${data.edited_by ? "border-bottom:none; margin-bottom:4px; padding-bottom:0;" : ""}'>Locked by ${data.dca_id || "-"} • ${created}</div>`;
            
            if (data.edited_by) {
                let editTime = data.edited_at ? formatDateTime(data.edited_at) : "";
                let editDot = editTime ? ` • ${editTime}` : "";
                metaSection += `<div class='created-meta' style='font-size: 11px; margin-top: 0;'><i class='fa fa-pen' style='font-size:10px; margin-right:4px;'></i>Edited by ${data.edited_by}${editDot}</div>`;
            }
            // =====================================

            let actionButton = "";
            if (data.status === "LOCK") {
                actionButton = `<button class='paid-btn' onclick="markAsPaid('${docId}', '${data.acc_no}')"><i class='fa-solid fa-check-circle'></i> Mark as PAID</button>`;
            }

            result.innerHTML =
            "<div class='result-card'>" +
            "<div class='status-box'><span style='background:"+statusColor+"'>" + statusText + "</span>" + paidByInfo + "</div>" +
            metaSection + // <--- SELITKAN META SECTION DI SINI
            "<div class='row'><div class='col'><div class='label'>ACCOUNT NO</div><div class='value'>" + data.acc_no + "</div></div>" +
            "<div class='col'><div class='label'>BRANCH</div><div class='value'>" + data.branch_name + "</div></div></div>" +
            "<div class='row'><div class='col'><div class='label'>LOCK AMOUNT</div><div class='amount'>" + amount + "</div></div>" +
            "<div class='col'><div class='label'>PROMISE DATE</div><div class='value'>" + formattedDate + "</div></div></div>" +
            "<div class='label'>PAYMENT CATEGORY</div><div class='value'>" + (data.payment_category || "-") + "</div><br>" +
            "<div class='label'>REMARKS</div><div class='remark'>" + (data.remarks || "-") + "</div>" +
            actionButton + "</div>";
        } else {
            result.innerHTML = "<div class='no-lock'>NO LOCK FOUND</div>";
        }
    } catch (err) { 
        console.error("Firebase Error: ", err);
        result.innerHTML = "<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>"; 
    }

    checkBtn.disabled = false; isLoading = false;
}

    try {

        await window.updateDoc(lockRef, {
            status: "PAID",
            paid_by: user, 
            paid_date: new Date().toISOString()
        });

        alert("Account " + acc + " successfully marked as PAID!");
        input.value = acc; 
        checkLock(); 
        
    } catch (err) { 
        console.error("Firebase Update Error: ", err);

}

function toggleRemark(el){
    let full = el.getAttribute("data-full");
    let short = el.getAttribute("data-short");
    let textEl = el.querySelector(".remark-text");
    let hintEl = el.querySelector(".tap-hint");

    if(el.classList.contains("is-expanded")){
        textEl.innerHTML = short;
        el.classList.remove("is-expanded");
        if(hintEl) hintEl.innerHTML = "<i class='fa fa-hand-pointer'></i> tap to view";
    } else {
        textEl.innerHTML = full;
        el.classList.add("is-expanded");
        if(hintEl) hintEl.innerHTML = "<i class='fa fa-times'></i> tap to minimize";
    }
}

function renderTable() {
    let start = (currentPage - 1) * pageSize;
    let end = start + pageSize;
    let pageData = filteredData.slice(start, end);
    let html = "";

    let today = new Date();
    today.setHours(0, 0, 0, 0);

    pageData.forEach(d => {
        let amount = "RM " + Number(d.amount || 0).toLocaleString("en-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        let pDate = new Date(d.promise);
        pDate.setHours(0, 0, 0, 0);
        
        let isExpired = pDate < today && d.status !== "PAID";
        let dateColor = isExpired ? "color: #ef4444; font-weight: 700;" : "";
        let rowBg = isExpired ? "background: #fef2f2;" : "";
        
        let dateStr = isNaN(pDate) ? d.promise : pDate.toLocaleDateString('en-GB', {day: 'numeric', month: 'short', year: 'numeric'});

        let cDate = new Date(d.created);
        let createdStr = "-";
        if (!isNaN(cDate.getTime())) {
            let day = ("0" + cDate.getDate()).slice(-2);
            let mths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            let mth = mths[cDate.getMonth()];
            let yr = cDate.getFullYear();
            let hr = cDate.getHours();
            let min = ("0" + cDate.getMinutes()).slice(-2);
            let ampm = hr >= 12 ? 'PM' : 'AM';
            hr = hr % 12; hr = hr ? hr : 12; 
            createdStr = `${day} ${mth} ${yr} <span style="display:block; font-size:10px; color:#94a3b8; font-weight:600; margin-top:2px;">${hr}:${min} ${ampm}</span>`;
        } else {
            createdStr = d.created || "-";
        }

        let remark = d.remarks || "-";
        let safeRemark = remark.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        let shortRemark = remark.length > 40 ? safeRemark.substring(0, 40) + "..." : safeRemark;

        let remarkHtml = remark.length > 40
            ? `<div style="cursor: pointer; max-width: 200px; word-break: break-word;" onclick="toggleRemark(this)" data-full="${safeRemark}" data-short="${shortRemark}">
                 <div class="remark-text">${shortRemark}</div>
                 <div class="tap-hint" style="font-size: 10px; color: #3b82f6; margin-top: 4px; font-style: italic;">
                    <i class='fa fa-hand-pointer'></i> tap to view
                 </div>
               </div>`
            : `<div style="max-width: 200px; word-break: break-word;">${safeRemark}</div>`;

        // =====================================
        // BINA TAG EDIT DI JADUAL (TINY TAG)
        // =====================================
        let editBadge = d.edited_by ? `<div style="margin-top: 6px; display: inline-block; background: #f8fafc; border: 1px dashed #cbd5e1; color: #475569; font-size: 9px; padding: 3px 6px; border-radius: 4px; font-weight: 600;"><i class="fa fa-pen" style="font-size:8px; margin-right:3px;"></i>Edited by: ${d.edited_by}</div>` : "";

        let statusBadge = d.status === "PAID" 
            ? `<div style="text-align:left;"><span style="background:#10b981; color:white; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">PAID</span><span style="display:block; font-size:10px; color:#64748b; font-weight:600; margin-top:4px;">by ${d.paid_by || '-'}</span></div>`
            : `<div style="text-align:left;"><span style="background:#f59e0b; color:white; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">LOCK</span></div>`;

        html += `
        <tr style="${rowBg}">
            <td>${d.dca || "-"}</td>
            <td style="font-weight: 600;">${d.acc_no || "-"}</td>
            <td>${d.branch || "-"}</td>
            <td style="text-align: center; font-weight: 700; color: #0f172a;">${amount}</td>
            <td>${statusBadge}</td>
            <td style="${dateColor}">${dateStr}</td>
            <td>${createdStr}</td>
            <td>${remarkHtml} ${editBadge}</td>
        </tr>`;
    });

    document.getElementById("lockTable").innerHTML = html || '<tr><td colspan="8" style="text-align:center; padding: 40px; color:#94a3b8;"><i class="fa fa-folder-open" style="font-size:28px;margin-bottom:12px;display:block;"></i>No Records Found</td></tr>';

    let totalPage = Math.ceil(filteredData.length / pageSize) || 1;
    let totalItems = filteredData.length;
    let startItem = totalItems === 0 ? 0 : ((currentPage - 1) * pageSize) + 1;
    let endItem = Math.min(currentPage * pageSize, totalItems);

    document.getElementById("pageInfo").innerHTML = `Showing <b>${startItem}</b> to <b>${endItem}</b> of <b>${totalItems}</b> results`;
    
    document.getElementById("prevBtn").disabled = currentPage === 1;
    document.getElementById("nextBtn").disabled = currentPage === totalPage || filteredData.length === 0;
}
    
function nextPage(){ if(currentPage * pageSize < filteredData.length){ currentPage++; renderTable(); } }
function prevPage(){ if(currentPage > 1){ currentPage--; renderTable(); } }

function exportToExcel() {
    if(filteredData.length === 0) { alert("Tiada data untuk diexport!"); return; }

    let excelData = filteredData.map(row => {
        let pDate = new Date(row.promise);
        let cDate = new Date(row.created);

        return {
            "DCA ID": row.dca || "-",
            "ACC NO": row.acc_no, 
            "BRANCH": row.branch,
            "AMOUNT (RM)": Number(row.amount || 0), 
            "STATUS": row.status,
            "PAID BY": row.paid_by || "-",
            "PTP DATE": isNaN(pDate.getTime()) ? row.promise : pDate, 
            "REMARKS": row.remarks || "-",
            "CREATED TIME": isNaN(cDate.getTime()) ? row.created : cDate
        };
    });

    let worksheet = XLSX.utils.json_to_sheet(excelData, { cellDates: true });
    let range = XLSX.utils.decode_range(worksheet['!ref']);
    for (let R = range.s.r + 1; R <= range.e.r; ++R) {
        let ptpCellRef = XLSX.utils.encode_cell({r: R, c: 6});
        if (worksheet[ptpCellRef] && worksheet[ptpCellRef].t === 'd') { worksheet[ptpCellRef].z = 'd-mmm-yyyy'; }
        let createdCellRef = XLSX.utils.encode_cell({r: R, c: 8});
        if (worksheet[createdCellRef] && worksheet[createdCellRef].t === 'd') { worksheet[createdCellRef].z = 'd-mmm-yyyy hh:mm AM/PM'; }
    }

    let workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Check_Records");
    let fileName = `CheckRecords_${user}_${currentViewStatus}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(workbook, fileName);
}

let currentSort = { col: null, dir: 'asc' };

function sortTableData(colId) {
    if (currentSort.col === colId) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort.col = colId;
        currentSort.dir = 'asc';
    }

    document.querySelectorAll('th .sort-icon').forEach(icon => icon.className = 'fa fa-sort sort-icon');
    const th = document.querySelector(`th[data-sort="${colId}"]`);
    if (th) th.querySelector('.sort-icon').className = currentSort.dir === 'asc' ? 'fa fa-sort-up sort-icon' : 'fa fa-sort-down sort-icon';

    let targetArray = typeof filteredTableData !== 'undefined' ? filteredTableData : (typeof filteredData !== 'undefined' ? filteredData : []);

    targetArray.sort((a, b) => {
        let valA = a[colId] || "";
        let valB = b[colId] || "";
        
        if (colId === 'acc_no') {
            let strA = valA.toString().trim();
            let strB = valB.toString().trim();
            
            if (strA.length !== strB.length) {
                return currentSort.dir === 'asc' ? (strA.length - strB.length) : (strB.length - strA.length);
            } else {
                return currentSort.dir === 'asc' ? strA.localeCompare(strB) : strB.localeCompare(strA);
            }
        } 
        else if (colId === 'amount') {
            valA = parseFloat(valA.toString().replace(/,/g, '')) || 0;
            valB = parseFloat(valB.toString().replace(/,/g, '')) || 0;
        } 
        else if (colId === 'promise' || colId === 'created') {
            valA = new Date(valA).getTime() || 0;
            valB = new Date(valB).getTime() || 0;
        } 
        else {
            valA = valA.toString().toLowerCase();
            valB = valB.toString().toLowerCase();
        }

        if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
        if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
        return 0;
    });

    currentPage = 1; 
    renderTable(); 
}

function initTableUpgrades() {
    const ths = document.querySelectorAll('th');
    ths.forEach(th => {
        const resizer = th.querySelector('.resizer');
        if(!resizer) return;

        let x, w;

        const mouseDownHandler = function(e) {
            x = e.clientX;
            w = th.offsetWidth;
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
            resizer.classList.add('resizing');
            e.stopPropagation(); 
        };

        const mouseMoveHandler = function(e) {
            const dx = e.clientX - x;
            th.style.width = `${w + dx}px`;
            th.style.minWidth = `${w + dx}px`;
        };

        const mouseUpHandler = function() {
            resizer.classList.remove('resizing');
            document.removeEventListener('mousemove', mouseMoveHandler);
            document.removeEventListener('mouseup', mouseUpHandler);
        };

        resizer.addEventListener('mousedown', mouseDownHandler);

        th.addEventListener('click', (e) => {
            if (e.target.classList.contains('resizer')) return;
            const sortCol = th.getAttribute('data-sort');
            if (sortCol) sortTableData(sortCol);
        });
    });
}

window.addEventListener('DOMContentLoaded', initTableUpgrades);

function verifySessionWithServer() {
    const currentToken = localStorage.getItem("session_token") || sessionStorage.getItem("session_token");
    if (!currentToken) return;

    fetch(api + "?action=session&token=" + currentToken + "&api_key=SCZP_SECURE_2026")
    .then(res => res.json())
    .then(data => {
        if (data.status !== "ACTIVE") {
            showSessionPopup("DEVICE"); 
        }
    })
    .catch(err => console.log("Connection error, skipping check..."));
}

let lastCheckTime = 0;
const CHECK_COOLDOWN = 1200000; 

function checkSessionOnAction() {
    const now = Date.now();
    if (now - lastCheckTime > CHECK_COOLDOWN) {
        lastCheckTime = now;
        verifySessionWithServer();
    }
}

verifySessionWithServer();
lastCheckTime = Date.now();

['mousedown', 'mousemove', 'keypress', 'touchstart', 'focusin', 'change'].forEach(eventName => {
    document.addEventListener(eventName, checkSessionOnAction, { passive: true });
});

document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
        lastCheckTime = Date.now(); 
        verifySessionWithServer();
    }
});
    
</script>
