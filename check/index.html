<!DOCTYPE html>
<html>

<head>

<title>Check Lock Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

/* ===== BASE & TYPOGRAPHY ===== */
*{
    box-sizing: border-box;
    font-family: 'Poppins', Arial, sans-serif;
}

html {
    font-size: clamp(14px, 1.1vw, 16px);
}

body {
    background: #1e293b !important;
    margin: 0;
    padding: 0;
    color: #334155;
    min-height: 100vh;
}

/* ANIMATIONS */
@keyframes slideUpFade {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== APP LAYOUT (DESKTOP SIDEBAR) ===== */
.app-layout {
    display: flex;
    min-height: 100vh;
    background: #f1f5f9;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 280px;
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    color: white;
    display: flex;
    flex-direction: column;
    padding: 45px 20px 16px 20px;
    position: fixed;
    height: 100vh;
    left: 0;
    top: 0;
    z-index: 50;
    box-shadow: 4px 0 15px rgba(0,0,0,0.1);
}

.brand {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
}

.brand i {
    color: #3b82f6;
    font-size: 24px;
}

.user-profile {
    background: rgba(255, 255, 255, 0.05);
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

#userInfo {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    line-height: 1.4;
}

.nav-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
}

.nav-btn {
    width: 100%;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: transparent;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    transition: all 0.3s ease;
}

.nav-btn i {
    font-size: 18px;
    width: 24px;
    text-align: center;
}

.nav-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    transform: translateX(4px);
}

.nav-btn.active {
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}

.logout-btn { 
    margin-top: auto;
    color: #fca5a5 !important;
}
.logout-btn:hover {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444 !important;
}

.paid-btn {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    transition: all 0.3s ease;
}
.paid-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
}

/* ===== MAIN CONTENT ===== */
.main-content {
    flex: 1;
    margin-left: 280px; 
    padding: 16px 40px 40px 40px; 
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.container {
    width: 100%;
    max-width: 700px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
    animation: slideUpFade 0.5s ease forwards;
    padding: 24px 32px 32px 32px; 
    transition: max-width 0.4s ease;
}

/* List Mode override */
body.list-mode .container {
    max-width: 100%;
}

.form-title {
    font-size: 20px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid #f1f5f9;
}

/* ===== INLINE SEARCH BAR (DESKTOP) ===== */
.search-bar-row {
    display: flex;
    gap: 16px;
    align-items: stretch; 
    margin-bottom: 10px;
}

.search-bar-row input {
    width: 280px;
    flex: 0 0 280px;
    padding: 16px 20px;
    font-size: 15px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    outline: none;
    transition: 0.3s;
    background: #f8fafc;
    color: #1e293b;
    text-align: center;
    letter-spacing: 1px;
    font-weight: 600;
}

.search-bar-row input:focus {
    background: #ffffff;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

.button-group {
    display: flex;
    gap: 12px;
    flex: 1; 
}

.button-group button {
    flex: 1;
    padding: 0 20px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.check-btn {
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    color: white;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
}

.check-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
}

.reset-btn {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #e2e8f0;
}

.reset-btn:hover {
    background: #e2e8f0;
    color: #1e293b;
}

/* ===== TAB STYLES ===== */
.tab-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid #e2e8f0;
    background: white;
    color: #64748b;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.tab-btn:hover {
    background: #f8fafc;
    color: #4f46e5;
    border-color: #cbd5e1;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
}

.tab-btn.active {
    background: #4f46e5;
    color: white;
    border-color: #4f46e5;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}

.tab-btn.active:hover {
    background: #4338ca;
    color: white;
    transform: translateY(-2px);
}

/* ===== TABLE STYLES (NEW) ===== */
.filter-card {
    padding: 16px 20px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    margin-bottom: 20px;
}

.filter-input-group {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
}

.filter-input-group input {
    margin-bottom: 0;
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    font-size: 14px;
    background: #f8fafc;
}

.mini-actions { display: flex; gap: 10px; }
.mini-btn {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s ease;
}
.mini-btn.search { background: #4f46e5; }
.mini-btn.search:hover { background: #4338ca; }
.mini-btn.clear { background: #64748b; }
.mini-btn.clear:hover { background: #475569; }

.table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

table th, table td {
    padding: 16px;
    border-bottom: 1px solid #e2e8f0;
    text-align: left;
}

table th {
    background: #f8fafc;
    font-weight: 600;
    font-size: 12px;
    color: #64748b;
    text-transform: uppercase;
}

table tr:last-child td { border-bottom: none; }
table tr:hover td { background: #f8fafc; }

/* CENTER AMOUNT COLUMN */
th:nth-child(4), td:nth-child(4) {
    text-align: center;
    font-weight: 600;
}
/* PREVENT DATE COLUMN FROM WRAPPING */
th:nth-child(4), td:nth-child(4) {
    white-space: nowrap;
}

.pagination-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    background: #f8fafc;
    padding: 10px;
    border-radius: 12px;
}

.page-btn {
    padding: 10px 18px;
    font-size: 13px;
    border-radius: 8px;
    background: white;
    border: 1px solid #e2e8f0;
    color: #4f46e5;
    cursor: pointer;
}
.page-btn:disabled { color: #94a3b8; cursor: not-allowed; }
#pageInfo { flex: 1; text-align: center; font-weight: 600; font-size: 13px; }

/* ===== PREMIUM MANUAL REFRESH BUTTON ===== */
.btn-refresh-premium {
    background: linear-gradient(135deg, #4f46e5, #3b82f6);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
}

.btn-refresh-premium:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(59, 130, 246, 0.4);
    background: linear-gradient(135deg, #4338ca, #2563eb);
}

.btn-refresh-premium:active {
    transform: translateY(0);
    box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
}

.btn-refresh-premium:disabled {
    background: #94a3b8;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.icon-spin {
    animation: spin 1s linear infinite;
}

/* ===== BUTTON EXPORT EXCEL ===== */
.btn-export {
    background: #1e293b;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    gap: 8px;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.btn-export:hover {
    background: #334155;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4);
}
.btn-export:active {
    transform: translateY(0);
    box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
}

/* JS INJECTED RESULT CARD (EXISTING) */
.result-card {
    margin-top: 24px;
    padding: 24px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.04);
    animation: fadeIn 0.4s ease forwards;
    width: 100%;
}
.status-box { text-align: center; margin-bottom: 16px; }
.status-box span {
    display: inline-block; padding: 8px 24px;
    color: white;
    font-weight: 700; font-size: 14px; border-radius: 30px; letter-spacing: 1px;
}
.created-meta { font-size: 12px; color: #64748b; text-align: center; margin-bottom: 24px;
    padding-bottom: 16px; border-bottom: 1px dashed #e2e8f0; }
.row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 16px; }
.col { flex: 1;
    word-break: break-word; }
.label { font-weight: 600; color: #64748b; font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.value { font-size: 15px;
    font-weight: 600; color: #0f172a; }
.amount { font-size: 24px; font-weight: 700; color: #0f172a; letter-spacing: 0.5px; }
.remark { margin-top: 6px; line-height: 1.5;
    font-size: 13px; color: #334155; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;
}

.no-lock {
    margin-top: 24px; padding: 24px; background: #fef2f2; border: 1px solid #fecdd3;
    border-radius: 16px; text-align: center;
    font-weight: 600; color: #be123c;
    display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%;
}
.no-lock::before { content: '\f071';
    font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 24px; color: #ef4444; }

.loading { margin-top: 30px; text-align: center; font-weight: 600;
    color: #475569; width: 100%; }
.spinner {
    margin: 16px auto 0; width: 40px; height: 40px;
    border: 4px solid #f1f5f9;
    border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* SESSION POPUP */
#sessionPopup {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none;
    align-items: center; justify-content: center; z-index: 9999;
}
.session-box {
    background: white; padding: 40px; border-radius: 20px; text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-width: 340px;
    width: 90%;
}
.session-box i { font-size: 48px; color: #ef4444; margin-bottom: 16px; }
.session-title { font-size: 20px; font-weight: 700; margin-bottom: 8px;
    color: #0f172a; }

/* ==========================================
   MOBILE RESPONSIVE (BOTTOM NAV STYLE)
   ========================================== */
@media (max-width: 899px) {
    .app-layout { flex-direction: column; }
    
        .sidebar {
        position: sticky;
        top: 0; width: 100%; height: auto; flex-direction: row; 
        justify-content: space-between; align-items: center; padding: 12px 16px;
        border-radius: 0 0 16px 16px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 40;
    }

    .brand { margin-bottom: 0; font-size: 18px; }
    .brand i { font-size: 20px; }
    .user-profile { margin-bottom: 0; text-align: right;
        background: transparent; border: none; padding: 0; }
    #userInfo { font-size: 12px; }

    .nav-menu {
        position: fixed; bottom: 0; left: 0;
        width: 100%; flex-direction: row;
        background: #ffffff; padding: 12px 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        z-index: 50;
        border-radius: 24px 24px 0 0; justify-content: space-around; gap: 5px;
    }
    .nav-btn {
        flex-direction: column;
        gap: 6px; padding: 8px 4px; font-size: 11px;
        color: #64748b; border-radius: 12px; justify-content: center; width: auto;
        height: auto; background: transparent;
    }
    .nav-btn span { display: block; font-size: 10px; font-weight: 500; } 
    .nav-btn i { font-size: 20px; margin: 0; width: auto; }
    .nav-btn:hover { transform: none; background: #f1f5f9; color: #4f46e5; }
    .nav-btn.active { background: #eef2ff; color: #4f46e5; box-shadow: none; }
    #navCheckLock, #navViewRecords { display: flex !important; }
    .logout-btn { margin-top: 0; color: #ef4444 !important; background: transparent; }

    .main-content { margin-left: 0; padding: 16px 8px 100px 8px; }
    .container { padding: 20px 16px; border-radius: 16px; }

    /* Fix Search Filter Mobile */
    .search-bar-row, .filter-input-group { flex-direction: column; gap: 16px; }
    .search-bar-row input, .filter-input-group input { width: 100%; flex: none; }
    .button-group, .mini-actions { flex-direction: column; width: 100%; }
    .button-group button, .mini-btn { padding: 14px; width: 100%; }

    .row { flex-direction: row; gap: 10px; }
    .value { font-size: 13px; }
    .amount { font-size: 20px; }
    .result-card, .no-lock, .loading { padding: 16px; }
    
    table th, table td { padding: 14px 10px; font-size: 11px; }
}

/* ==========================================
   TABLE UPGRADES: STICKY, ZEBRA, SORT, RESIZE
   ========================================== */
.table-scroll { 
    max-height: 60vh;
    /* Adjust height to trigger sticky scroll */
    overflow-y: auto; 
    overflow-x: auto;
}

table th { 
    position: sticky !important; 
    top: 0; 
    z-index: 10; 
    background: #f8fafc !important;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
}

table th:hover { background: #f1f5f9 !important; }

/* Zebra Striping */
table tbody tr:nth-child(even) { background-color: #f8fafc; }
table tbody tr:nth-child(odd) { background-color: #ffffff; }
table tbody tr:hover td { background-color: #e2e8f0; } /* Stronger hover to override zebra */

/* Column Resizer Handle */
.resizer {
    position: absolute;
    top: 0; 
    right: 0; 
    width: 6px; 
    cursor: col-resize; 
    user-select: none; 
    height: 100%; 
    border-right: 1px solid #cbd5e1;
}
.resizer:hover, .resizer.resizing { border-right: 2px solid #4f46e5; }

/* Sort Icons */
.sort-icon { 
    margin-left: 6px; 
    color: #94a3b8;
    font-size: 11px; 
}
    
</style>

</head>

<body>

<div class="app-layout">

    <nav class="sidebar">
<div class="brand">
    <img src="../singer-logo-png-5.png" alt="Singer Logo" style="width: 28px; height: auto; object-fit: contain;"> Lock Portal
</div>
        
        <div class="user-profile">
            <div id="userInfo"></div>
        </div>
        
        <div class="nav-menu">
            <button class="nav-btn active" id="navCheckLock" onclick="goCheckLock()">
                <i class="fa fa-magnifying-glass"></i> <span>Check Lock</span>
            </button>

            <button class="nav-btn" id="navViewRecords" onclick="viewRecords()">
                <i class="fa fa-list-check"></i> <span>View Records</span>
            </button>
            
            <button id="masterBtn" class="nav-btn" onclick="goMaster()" style="display:none">
                <i class="fa-solid fa-crown"></i> <span>Master Menu</span>
            </button>
            
            <button class="nav-btn logout-btn" onclick="logout()">
                <i class="fa fa-power-off"></i> <span>Logout</span>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            
            <div id="searchSection">
                <div class="form-title">Check Lock Status</div>

                <div class="search-bar-row">
                    <input
                        type="text"
                        id="acc_no"
                        autocomplete="off"
                        inputmode="numeric"
                        maxlength="10"
                        placeholder="ENTER ACCOUNT NO">

                    <div class="button-group">
                        <button class="check-btn" id="checkBtn">
                            <i class="fa fa-search"></i> Check Lock
                        </button>
                        <button class="reset-btn" id="resetBtn">
                            <i class="fa fa-rotate-left"></i> New Search
                        </button>
                    </div>
                </div>

                <div id="result"></div>
            </div>

            <div id="listSection" style="display:none;">
                <div class="form-title" style="margin-bottom: 15px;">All Records</div>

<div class="tab-container">
    <button id="tabActive" class="tab-btn active" onclick="switchView('LOCK')">Active Locks</button>
    <button id="tabPaid" class="tab-btn" onclick="switchView('PAID')">Paid History</button>
    <button id="tabAll" class="tab-btn" onclick="switchView('ALL')">View All</button>
</div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; margin-top: 10px;">
                    <div style="font-size: 14px; font-weight: 600; color: #1e293b;">
                        <i class="fa fa-list-check" style="color: #4f46e5; margin-right: 5px;"></i> Record List
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-refresh-premium" id="btnReloadTable" onclick="manualTableRefresh()">
                            <i class="fa-solid fa-arrows-rotate" id="reloadIcon"></i> Reload Data
                        </button>
                        <button class="btn-export" onclick="exportToExcel()">
                            <i class="fa fa-file-excel" style="color: #10b981;"></i> Export
                        </button>
                    </div>
                </div>

<div class="table-scroll">
    <table style="min-width: 600px;">
<thead>
    <tr>
        <th data-sort="dca">DCA <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
        <th data-sort="acc_no">ACC NO <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
        <th data-sort="branch">BRANCH <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
        <th data-sort="amount">AMOUNT <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
        <th data-sort="status">STATUS <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
        <th data-sort="promise">PTP DATE <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
        <th data-sort="remarks">REMARKS <i class="fa fa-sort sort-icon"></i><div class="resizer"></div></th>
    </tr>
</thead>
        <tbody id="lockTable"></tbody>
    </table>
</div>

                <div class="pagination-bar">

<script>
// ==========================================
// INITIALIZATION & STORAGE CHECK
// ==========================================

const api = API_URL;
const user = localStorage.getItem("lock_user") || sessionStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role") || sessionStorage.getItem("lock_role");
const token = localStorage.getItem("session_token") || sessionStorage.getItem("session_token");
const type = localStorage.getItem("lock_type") || sessionStorage.getItem("lock_type");

if(!type || !token){ logout(); }

if(type == "lock"){
    alert("Access denied");
    window.location="../lock/";
}

if(type === "master"){
    document.getElementById("masterBtn").style.display = "flex";
}

document.getElementById("userInfo").innerHTML = "User: "+(user || "-")+" | Role: "+(role || "-");

// ==========================================
// NAVIGATION (TAB SWITCHING)
// ==========================================

function updateNavState(activeId) {
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(activeId).classList.add('active');
}

function goCheckLock() {
    document.getElementById("searchSection").style.display = "block";
    document.getElementById("listSection").style.display = "none";
    document.body.classList.remove("list-mode");
    updateNavState('navCheckLock');
}

// ==========================================
// SECTION 1: SEARCH & DISPLAY FUNCTIONS
// ==========================================

const input=document.getElementById("acc_no");
const result=document.getElementById("result");
const checkBtn=document.getElementById("checkBtn");
const resetBtn=document.getElementById("resetBtn");
let isLoading=false;

window.onload=()=>{ input.focus(); };

function formatDate(dateStr){
    if(!dateStr) return "-";
    if(dateStr.includes("-") && dateStr.split("-")[0].length==4){
        var p=dateStr.split("-");
        var year=p[0]; var month=parseInt(p[1])-1; var day=p[2];
        var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return day+" "+m[month]+" "+year;
    }
    if(dateStr.includes("/")){
        var p=dateStr.split("/"); var day=parseInt(p[0]); var month=parseInt(p[1])-1; var year=p[2];
        var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return ("0"+day).slice(-2)+" "+m[month]+" "+year;
    }
    if(dateStr.includes("T")){
        var d=new Date(dateStr);
        var day=("0"+d.getDate()).slice(-2); var month=d.getMonth(); var year=d.getFullYear();
        var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return day+" "+m[month]+" "+year;
    }
    return dateStr;
}

function formatDateTime(dateStr){
    if(!dateStr) return "-";
    const parts = dateStr.split(" ");
    if(parts.length < 2) return dateStr;
    const datePart = parts[0].split("/"); const timePart = parts[1].split(":");
    const day = datePart[0]; const monthIndex = parseInt(datePart[1]) - 1;
    const year = datePart[2];
    const hour = timePart[0]; const minute = timePart[1];
    const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return day+" "+m[monthIndex]+" "+year+" "+hour+":"+minute;
}

async function checkLock(){
    const acc=input.value.trim();
    if(!acc){ alert("Enter Account No"); input.focus(); return; }
    if(isLoading) return;
    isLoading=true; checkBtn.disabled=true;
    result.innerHTML= "<div class='loading'>Checking Lock Status<div class='spinner'></div></div>";

    try{
        const res = await fetch(api+"?acc_no="+encodeURIComponent(acc)+"&token="+token+"&api_key=SCZP_SECURE_2026");
        const data=await res.json();

        if(data.status=="UNAUTHORIZED"){
            if(data.reason=="SESSION_REPLACED") showSessionPopup("DEVICE");
            else showSessionPopup("EXPIRED");
            return;
        }

        if(data.status === "LOCK" || data.status === "PAID"){
            const formattedDate=formatDate(data.valid);
            const created=formatDateTime(data.created);
            const amount = "RM " + Number(data.amount || 0).toLocaleString("en-MY",{ minimumFractionDigits:2, maximumFractionDigits:2 });

            const promiseDate=new Date(data.valid);
            const today=new Date();
            today.setHours(0,0,0,0); promiseDate.setHours(0,0,0,0);

            let isPaid = (data.status === "PAID");
            let statusText = isPaid ? "ALREADY PAID" : "LOCKED";
            let statusColor = isPaid ? "#10b981" : "#f59e0b"; 

            if(!isPaid && today > promiseDate){ statusText = "EXPIRED"; statusColor = "#ef4444"; }

            // 1. INFO VERIFIED DI DALAM KOTAK HIJAU CAIR PREMIUM
            let paidByInfo = (isPaid && data.paid_by) 
                ? `<div style='margin-top: 14px;'><span style='background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-block; letter-spacing: 0.3px;'><i class='fa-solid fa-check-double' style='margin-right: 4px;'></i> Verified Paid by ${data.paid_by}</span></div>` 
                : "";

            let actionButton = "";
            if(data.status === "LOCK") {
                actionButton = `<button class='paid-btn' onclick="markAsPaid('${data.acc_no}')"><i class='fa-solid fa-check-circle'></i> Mark as PAID</button>`;
            }

            // 2. KEMBALIKAN CREATED BY DAN SUSUN DENGAN KEMAS
            result.innerHTML=
            "<div class='result-card'>"+
            "<div class='status-box'><span style='background:"+statusColor+"'>"+statusText+"</span>"+paidByInfo+"</div>"+
            "<div class='created-meta'>Locked by "+data.dca_id+" • "+created+"</div>"+
            "<div class='row'><div class='col'><div class='label'>ACCOUNT NO</div><div class='value'>"+data.acc_no+"</div></div>"+
            "<div class='col'><div class='label'>BRANCH</div><div class='value'>"+data.branch+"</div></div></div>"+
            "<div class='row'><div class='col'><div class='label'>LOCK AMOUNT</div><div class='amount'>"+amount+"</div></div>"+
            "<div class='col'><div class='label'>PROMISE DATE</div><div class='value'>"+formattedDate+"</div></div></div>"+
            "<div class='label'>PAYMENT CATEGORY</div><div class='value'>"+(data.category || "-")+"</div><br>"+
            "<div class='label'>REMARKS</div><div class='remark'>"+(data.remarks || "-")+"</div>"+
            actionButton + "</div>";
        } else {
            result.innerHTML= "<div class='no-lock'>NO LOCK FOUND</div>";
        }
    }catch(err){ result.innerHTML= "<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>"; }

    checkBtn.disabled=false; isLoading=false;
}

async function markAsPaid(acc) {
    if(!confirm("Are you sure you want to mark Account " + acc + " as PAID?")) return;
    checkBtn.disabled = true;
    result.innerHTML = "<div class='loading'>Updating to PAID...<div class='spinner'></div></div>";

    try {
        const formData = new URLSearchParams({ action: "mark_paid", acc_no: acc, token: token, api_key: "SCZP_SECURE_2026" });
        const res = await fetch(api, { method: "POST", body: formData });
        const textResponse = await res.text();

        if(textResponse === "PAID_SUCCESS") {
            alert("Account " + acc + " successfully marked as PAID!");
            input.value = acc; checkLock(); 
        } else {
            alert("Failed to mark as PAID. Please try again.");
            checkLock();
        }
    } catch (err) { alert("System error. Check your connection."); checkBtn.disabled = false; }
}

function newSearch(){
    input.value=""; result.innerHTML=""; checkBtn.disabled=false; input.focus();
}

checkBtn.addEventListener("click",checkLock);
resetBtn.addEventListener("click",newSearch);
input.addEventListener("keypress",function(e){ if(e.key==="Enter"){ checkLock(); } });
input.addEventListener("input",function(){ this.value=this.value.replace(/[^0-9]/g,''); });

// ==========================================
// SECTION 2: VIEW RECORDS & EXPORT LOGIC
// ==========================================

let fullData = [];
let filteredData = [];
let currentPage = 1;
const pageSize = 10;
let currentViewStatus = "LOCK"; // Default paparan adalah LOCK

function switchView(viewType) {
    currentViewStatus = viewType;

    // 1. Buang warna aktif dari semua butang
    document.getElementById("tabActive").classList.remove("active");
    document.getElementById("tabPaid").classList.remove("active");
    document.getElementById("tabAll").classList.remove("active");

    // 2. Beri warna aktif kepada butang yang ditekan
    if(viewType === "LOCK") document.getElementById("tabActive").classList.add("active");
    if(viewType === "PAID") document.getElementById("tabPaid").classList.add("active");
    if(viewType === "ALL") document.getElementById("tabAll").classList.add("active");
    
    // 3. Filter data mengikut status (LOCK, PAID, atau ALL)
    filteredData = fullData.filter(d => {
        if(currentViewStatus === "ALL") return true; // Tunjuk semua data
        
        let status = (d.status || "").toString().toUpperCase();
        return status === currentViewStatus;
    });

    currentPage = 1;
    renderTable();
}

// Tukar logik viewRecords supaya menggunakan Smart Caching
async function viewRecords() {
    document.getElementById("searchSection").style.display="none";
    document.getElementById("listSection").style.display="block";
    document.body.classList.add("list-mode");
    updateNavState('navViewRecords');

    if(fullData.length === 0){
        document.getElementById("lockTable").innerHTML = 
        "<tr><td colspan='7' style='text-align:center;padding:40px;color:#64748b;'><i class='fa fa-cloud-arrow-down' style='font-size:28px;margin-bottom:12px;display:block;color:#4f46e5;'></i>Click <b>Reload Data</b> to fetch latest records</td></tr>";
        
        document.getElementById("pageInfo").innerText = "-";
        document.getElementById("prevBtn").disabled = true;
        document.getElementById("nextBtn").disabled = true;
    } else {
        switchView(currentViewStatus);
    }
}

// Logik Manual Reload untuk Portal Check
async function manualTableRefresh() {
    let btn = document.getElementById("btnReloadTable");
    let icon = document.getElementById("reloadIcon");
    
    btn.disabled = true;
    icon.classList.add("icon-spin");
    
    document.getElementById("lockTable").innerHTML = 
    "<tr><td colspan='7' style='text-align:center;padding:40px;color:#64748b;'><i class='fa fa-circle-notch fa-spin' style='font-size:28px;margin-bottom:12px;display:block;color:#4f46e5;'></i>Loading records from server...</td></tr>";

    try {
        let timestamp = new Date().getTime(); 
        
        const res = await fetch(api+"?action=dashboard&token="+token+"&dca=ALL&api_key=SCZP_SECURE_2026&t=" + timestamp);
        const json = await res.json(); 

        if(json.status === "UNAUTHORIZED"){
            if(json.reason === "SESSION_REPLACED") showSessionPopup("DEVICE");
            else showSessionPopup("EXPIRED");
            return;
        } else if(json.status === "ACCESS_DENIED"){
            document.getElementById("lockTable").innerHTML = "<tr><td colspan='7' style='text-align:center;padding:20px'>Access Denied</td></tr>";
            return;
        }

        fullData = (json.data || []).sort((a,b)=> new Date(b.created) - new Date(a.created));
        switchView(currentViewStatus);

    } catch(e) {
        document.getElementById("lockTable").innerHTML = "<tr><td colspan='7' style='text-align:center;padding:20px;color:#ef4444;'>Error loading database. Please try again.</td></tr>";
    } finally {
        btn.disabled = false;
        icon.classList.remove("icon-spin");
    }
}

// Fungsi baca remark penuh
function toggleRemark(el){
    let full = el.getAttribute("data-full");
    let short = el.getAttribute("data-short");
    let textEl = el.querySelector(".remark-text");
    let hintEl = el.querySelector(".tap-hint");

    if(textEl.innerText === full){
        textEl.innerText = short;
        if(hintEl) hintEl.innerHTML = "<i class='fa fa-hand-pointer'></i> tap to view";
    }else{
        textEl.innerText = full;
        if(hintEl) hintEl.innerHTML = "<i class='fa fa-times'></i> tap to close";
    }
}

function renderTable() {
    let start = (currentPage - 1) * pageSize;
    let end = start + pageSize;
    let pageData = filteredData.slice(start, end);
    let html = "";

    let today = new Date();
    today.setHours(0, 0, 0, 0);

    pageData.forEach(d => {
        let amount = "RM " + Number(d.amount || 0).toLocaleString("en-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        
        let pDate = new Date(d.promise);
        pDate.setHours(0, 0, 0, 0);
        
        let isExpired = pDate < today && d.status !== "PAID";
        let dateColor = isExpired ? "color: #ef4444; font-weight: 700;" : "";
        let rowBg = isExpired ? "background: #fef2f2;" : "";
        
        let dateStr = isNaN(pDate) ? d.promise : pDate.toLocaleDateString('en-GB', {day: 'numeric', month: 'short', year: 'numeric'});

        let remark = d.remarks || "-";
        let safeRemark = remark.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        let shortRemark = remark.length > 40 ? safeRemark.substring(0, 40) + "..." : safeRemark;

        let remarkHtml = remark.length > 40
            ? `<div style="cursor: pointer; max-width: 200px; word-break: break-word;" onclick="toggleRemark(this)" data-full="${safeRemark}" data-short="${shortRemark}">
                 <div class="remark-text">${shortRemark}</div>
                 <div class="tap-hint" style="font-size: 10px; color: #3b82f6; margin-top: 4px; font-style: italic;">
                    <i class='fa fa-hand-pointer'></i> tap to view
                 </div>
               </div>`
            : `<div style="max-width: 200px; word-break: break-word;">${safeRemark}</div>`;

        let statusBadge = d.status === "PAID" 
            ? `<div style="text-align:left;"><span style="background:#10b981; color:white; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">PAID</span><span style="display:block; font-size:10px; color:#64748b; font-weight:600; margin-top:4px;">by ${d.paid_by || '-'}</span></div>`
            : `<div style="text-align:left;"><span style="background:#f59e0b; color:white; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">LOCK</span></div>`;

        html += `
        <tr style="${rowBg}">
            <td>${d.dca || "-"}</td>
            <td style="font-weight: 600;">${d.acc_no || "-"}</td>
            <td>${d.branch || "-"}</td>
            <td style="text-align: center; font-weight: 700; color: #0f172a;">${amount}</td>
            <td>${statusBadge}</td>
            <td style="${dateColor}">${dateStr}</td>
            <td>${remarkHtml}</td>
        </tr>`;
    });

    document.getElementById("lockTable").innerHTML = html || '<tr><td colspan="7" style="text-align:center; padding: 40px; color:#94a3b8;"><i class="fa fa-folder-open" style="font-size:28px;margin-bottom:12px;display:block;"></i>No Records Found</td></tr>';

    let totalPage = Math.ceil(filteredData.length / pageSize) || 1;
    document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPage}`;
    
    document.getElementById("prevBtn").disabled = currentPage === 1;
    document.getElementById("nextBtn").disabled = currentPage === totalPage || filteredData.length === 0;
}

function nextPage(){ if(currentPage * pageSize < filteredData.length){ currentPage++; renderTable(); } }
function prevPage(){ if(currentPage > 1){ currentPage--; renderTable(); } }

function exportToExcel() {
    if(filteredData.length === 0) { alert("Tiada data untuk diexport!"); return; }

    let excelData = filteredData.map(row => {
        let pDate = new Date(row.promise);
        let cDate = new Date(row.created);

        return {
            "DCA ID": row.dca || "-",
            "ACC NO": row.acc_no, 
            "BRANCH": row.branch,
            "AMOUNT (RM)": Number(row.amount || 0), 
            "STATUS": row.status,
            "PAID BY": row.paid_by || "-", // <-- TAMBAH BARIS INI
            "PTP DATE": isNaN(pDate.getTime()) ? row.promise : pDate, 
            "REMARKS": row.remarks || "-",
            "CREATED TIME": isNaN(cDate.getTime()) ? row.created : cDate
        };
    });

    let worksheet = XLSX.utils.json_to_sheet(excelData, { cellDates: true });
    let range = XLSX.utils.decode_range(worksheet['!ref']);
    for (let R = range.s.r + 1; R <= range.e.r; ++R) {
        let ptpCellRef = XLSX.utils.encode_cell({r: R, c: 6});
        if (worksheet[ptpCellRef] && worksheet[ptpCellRef].t === 'd') { worksheet[ptpCellRef].z = 'd-mmm-yyyy'; }
        let createdCellRef = XLSX.utils.encode_cell({r: R, c: 8});
        if (worksheet[createdCellRef] && worksheet[createdCellRef].t === 'd') { worksheet[createdCellRef].z = 'd-mmm-yyyy hh:mm AM/PM'; }
    }

    let workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Check_Records");
    // TAMBAHAN: Nama fail membezakan LOCK dan PAID
    let fileName = `CheckRecords_${user}_${currentViewStatus}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(workbook, fileName);
}

function goMaster(){ window.location="../menumaster/"; }

// Logout & Clear Data
function logout(){
    localStorage.clear(); sessionStorage.clear();
    window.location="../checklock-login/";
}

/* =========================================
   SINGLE DEVICE LOGIN & SMART PAUSE LOGIC
========================================= */

const CHECK_INTERVAL = 60000;
function verifySessionWithServer() {
    if (document.hidden) return; 
    const currentToken = localStorage.getItem("session_token") || sessionStorage.getItem("session_token");
    if (!currentToken) { showSessionPopup("EXPIRED"); return; }

    fetch(api + "?action=session&token=" + currentToken + "&api_key=SCZP_SECURE_2026")
    .then(response => response.json())
    .then(data => {
        if (data.status !== "ACTIVE") {
            if (data.reason === "SESSION_REPLACED") showSessionPopup("DEVICE");
            else showSessionPopup("EXPIRED");
        }
    }).catch(error => { console.log("Check paused."); });
}

verifySessionWithServer();
setInterval(verifySessionWithServer, CHECK_INTERVAL);
document.addEventListener("visibilitychange", () => { if (!document.hidden) verifySessionWithServer(); });

// Popup UI Controller
function showSessionPopup(type){
    let title="Session Expired";
    let msg="Your session has expired. Please login again.";
    if(type==="DEVICE"){ title="Logged In From Another Device"; msg="Your account has been logged in from another device."; }

    document.getElementById("sessionTitle").innerText=title;
    document.getElementById("sessionMsg").innerText=msg;
    document.getElementById("sessionPopup").style.display="flex";

    setTimeout(()=>{ localStorage.clear(); sessionStorage.clear(); window.location="../checklock-login/"; }, 3000);
}

/* ==========================================
   TABLE UPGRADES JS: SORTING & RESIZING
   ========================================== */
let currentSort = { col: null, dir: 'asc' };
function sortTableData(colId) {
    if (currentSort.col === colId) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort.col = colId;
        currentSort.dir = 'asc';
    }

    // Reset and Update Icons
    document.querySelectorAll('th .sort-icon').forEach(icon => icon.className = 'fa fa-sort sort-icon');
    const th = document.querySelector(`th[data-sort="${colId}"]`);
    if (th) th.querySelector('.sort-icon').className = currentSort.dir === 'asc' ? 'fa fa-sort-up sort-icon' : 'fa fa-sort-down sort-icon';
    
    // Auto-detect target array
    let targetArray = typeof filteredTableData !== 'undefined' ? filteredTableData : (typeof filteredData !== 'undefined' ? filteredData : []);
    
    targetArray.sort((a, b) => {
        let valA = a[colId] || "";
        let valB = b[colId] || "";
        
        if (colId === 'acc_no') {
            // 🔥 METHOD BARU: Susun ikut bilangan digit (length) dahulu, kemudian baru ikut nilai
            let strA = valA.toString().trim();
            let strB = valB.toString().trim();
            
            if (strA.length !== strB.length) {
                // Jika panjang tak sama, yang kurang digit duduk atas
                return currentSort.dir === 'asc' ? (strA.length - strB.length) : (strB.length - strA.length);
            } else {
                // Jika bilangan digit sama, baru susun nilai dari kecil ke besar macam biasa
                return currentSort.dir === 'asc' ? strA.localeCompare(strB) : strB.localeCompare(strA);
            }
        } 
        else if (colId === 'amount') {
            valA = parseFloat(valA.toString().replace(/,/g, '')) || 0;
            valB = parseFloat(valB.toString().replace(/,/g, '')) || 0;
        } 
        else if (colId === 'promise' || colId === 'created') {
            valA = new Date(valA).getTime() || 0;
            valB = new Date(valB).getTime() || 0;
        } 
        else {
            valA = valA.toString().toLowerCase();
            valB = valB.toString().toLowerCase();
        }

        // Logic sort standard untuk kolum-kolum selain acc_no
        if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
        if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
        return 0;
    });
    
    currentPage = 1; 
    renderTable(); 
}

function initTableUpgrades() {
    const ths = document.querySelectorAll('th');
    ths.forEach(th => {
        const resizer = th.querySelector('.resizer');
        if(!resizer) return;

        let x, w;

        // --- Column Resizing Logic ---
        const mouseDownHandler = function(e) {
            x = e.clientX;
            w = th.offsetWidth;
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
            resizer.classList.add('resizing');
            e.stopPropagation(); // Prevents click sort from firing
        };

        const mouseMoveHandler = function(e) {
            const dx = e.clientX - x;
            th.style.width = `${w + dx}px`;
            th.style.minWidth = `${w + dx}px`;
        };

        const mouseUpHandler = function() {
            resizer.classList.remove('resizing');
            document.removeEventListener('mousemove', mouseMoveHandler);
            document.removeEventListener('mouseup', mouseUpHandler);
        };

        resizer.addEventListener('mousedown', mouseDownHandler);
        
        // --- Column Sorting Logic ---
        th.addEventListener('click', (e) => {
            // Ignore click if user was grabbing the resizer
            if (e.target.classList.contains('resizer')) return;
            
            const sortCol = th.getAttribute('data-sort');
            if (sortCol) sortTableData(sortCol);
        });
    });
}

// Initialize upgrades automatically when the DOM is ready
window.addEventListener('DOMContentLoaded', initTableUpgrades);
</script>
